<article class="container">
  <div class="profile">
    
    <div class="profile-section">
      <div class="profile-pic">
        <img [src]="profileImagePreview" alt="Foto de perfil" id="profileImage" class="circular-preview">
        <label for="fileInput" class="upload-btn">Seleccionar nueva foto</label>
        <input type="file" id="fileInput" (change)="onFileSelected($event)" accept="image/*" hidden>
      </div>
    </div>

    <form [formGroup]="profileForm" (ngSubmit)="saveChanges()" class="info-section">
      <h2>Configurar cuenta</h2>
      
      <label>Nuevo Nombre de usuario:</label>
      <input type="text" formControlName="username" placeholder="Tu nombre de usuario">

      <label>Nueva Contraseña:</label>
      <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Al menos 6 caracteres">

      <div class="checkbox-wrapper">
        <input type="checkbox" id="show-password" (change)="togglePassword()">
        <label for="show-password">Mostrar contraseña</label>
      </div>

      <label>Confirmar Contraseña:</label>
      <input type="password" formControlName="confirmPassword" placeholder="Repite tu contraseña">
      
      @if (profileForm.get('confirmPassword')?.value !== '' && 
           profileForm.get('password')?.value !== profileForm.get('confirmPassword')?.value) {
        <p class="error-message">Las contraseñas no coinciden.</p>
      }

      <div class="button-group">
        <button type="submit" id="saveChanges" [disabled]="profileForm.invalid">Guardar Cambios</button>
        <button type="button" class="delete-btn" (click)="deleteAccount()">Eliminar Cuenta</button>
      </div>
    </form>

  </div>
</article>

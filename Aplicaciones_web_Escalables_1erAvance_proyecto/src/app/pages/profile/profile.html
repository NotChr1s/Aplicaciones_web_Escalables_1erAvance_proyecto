<article class="container">
    <div class="profile">
        <img [src]="authService.currentUser()?.profilePicture | safeImg" alt="Imagen de Perfil" class="circular-image">
        <h2 class="username">{{ authService.currentUser()?.name }}</h2>

        <div class="buttons">
            <button routerLink="/profile-management">
                <span>Editar Perfil</span>
            </button>
            <button routerLink="/games">
                <span>Ver Lista</span>
            </button>
        </div>
    </div>
</article>

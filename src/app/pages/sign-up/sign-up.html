<article class="container">
  <div class="sign_up">
    <h1>Empieza a usar MYGAMINGLIST</h1>
    <p>Únete para catalogar tus videojuegos y crear tu perfil. Es gratis.</p>

    <hr class="divider">

    <form (submit)="onRegister($event)">
      
      <div class="form-group">
        <label for="email">Correo</label>
        <input type="email" id="email" required>
      </div>

      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" minlength="2" maxlength="16" required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        
        <input [type]="showPassword ? 'text' : 'password'" id="password" name="password"  [(ngModel)]="password" required>
        
        <div class="checkbox-group">
          <input type="checkbox" id="show-password" (change)="togglePassword()">
          <label for="show-password">Mostrar contraseña</label>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirmar Contraseña</label>
        <input type="password" id="confirm-password" name="confirmPassword" [(ngModel)]="confirmPassword" required>
        
        @if (confirmPassword !== '' && password !== confirmPassword) {
            <p class="error-message" style="display: block;">Las contraseñas no coinciden.</p>
        }
      </div>

      <div class="form-group">
        <label>Cumpleaños</label>
        <div class="birthday-row">
          
          <select id="month">
            @for (month of months; track month) {
              <option [value]="month">{{ month }}</option>
            }
          </select>

          <select id="day">
            @for (day of days; track day) {
              <option [value]="day">{{ day }}</option>
            }
          </select>

          <select id="year">
            @for (year of years; track year) {
              <option [value]="year">{{ year }}</option>
            }
          </select>
        </div>
      </div>

      <button type="submit" class="create-account" [disabled]="!passwordsMatch()" [style.opacity]="passwordsMatch() ? '1' : '0.5'"> Crear Cuenta</button>
    </form>
  </div>
</article>
